<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
   <meta charset='UTF-8'>
    <title>PA Assistant</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="script.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <section class="j-entry" id="flight-paramaters">
      <div>
        <label for="fl">Flight Level:</label>
        <input id="fl" type="text" size=3 pattern="[0-9]{1,3}" inputmode="numeric">
      </div>
      <div>
        <label for="track">Track:</label>
        <input id="track" type="text" size=3 pattern="[0-9]{1,3}" inputmode="numeric">
      </div>
      <div>
        <label for="gs">Ground Speed (kt):</label>
        <input id="gs" type="text" size=3 pattern="[0-9]{1,3}" inputmode="numeric">
      </div>
      <button id="fp-next">Next</button>
    </section>
    <section class="j-entry hidden" id="position">
      <div>
        <label for="waypoint">Waypoint:</label>
        <input id="waypoint" type="text" size=15>
      </div>
      <div>
        <label for="bearing">Bearing:</label>
        <input id="bearing" type="text" size=3 pattern="[0-9]{1,3}" inputmode="numeric">
      </div>
      <div>
        <label for="distance">Distance (nm):</label>
        <input id="distance" type="text" size=4 pattern="[0-9]{1,4}" inputmode="numeric">
      </div>
      <div>
        <button id="wp-back">Back</button>
        <button id="wp-next">Next</button>
      </div>
    </section>
    <section class="j-entry hidden" id="distance">
      <div>
        <label for="dtot">Sector Length (nm):</label>
        <input id="dtot" type="text" size=5 pattern="[0-9]{1,5}" inputmode="numeric">
      </div>
      <div>
        <label for="dtg">Distance to go (nm):</label>
        <input id="dtg" type="text" size=5 pattern="[0-9]{1,5}" inputmode="numeric">
      </div>
      <div>
        <button id="d-back">Back</button>
        <button id="d-next">Next</button>
      </div>
    </section>
    <section class="j-entry hidden" id="time">
      <div>
        <label for="sta">Scheduled Arrival (Z):</label>
        <input id="sta" type="text" size=4 pattern="[0-9]{1,4}" inputmode="numeric">
      </div>
      <div>
        <label for="eta">ETA (Z):</label>
        <input id="eta" type="text" size=4 pattern="[0-9]{1,4}" inputmode="numeric">
      </div>
      <div>
        <label for="tz">TZ offset:</label>
        <input id="tz" type="text" size=2 pattern="[0-9\-]{1,2}" inputmode="numeric">
      </div>
      <div>
        <button id="t-back">Back</button>
        <button id="done">Done</button>
      </div>
    </section>
    <section class="j-output hidden" id="output">
      <div>
        <h2>Flight parameters</h2>
        <dl>
          <dt>Altitude</dt><dd><span id="o-fp-alt">XXX</span>km ASL</dd>
          <dt>Tracking</dt><dd><span id="o-fp-fuzzy-trk">XXX</span></dd>
          <dt>Speed</dt><dd><span id="o-fp-speed">XXX</span>km/h</dd>
          <dt>Seconds/km</dt><dd><span id="o-fp-secs-per-km">X</span></dd>
        </dl>
      </div>
      <div>
        <h2>Current position</h2>
        <dl>
          <dt>Distance</dt><dd><span id="o-wp-dist">XX</span>km</dd>
          <dt>Bearing from</dt><dd><span id="o-wp-fuzzy-brg-from ">XXXX</span></dd>
          <dt>Place</dt><dd><span id="o-wp-name">XX</span></dd>
        </dl>
      </div>
      <div>
        <h2>Distances</h2>
        <dl>
          <dt>Left to run</dt><dd><span id="o-dist-left">XXX</span>km</dd>
          <dt>Sector length</dt><dd><span id="o-dist-sector">XXX</span>km</dd>
          <dt>Fraction remaining</dt><dd><span id="o-dist-left-fraction">X</span></dd>
        </dl>
      </div>
      <div>
        <h2>Times</h2>
        <dl>
          <dt>ETA (local time)</dt><dd><span id="o-eta">XX:XX</span></dd>
          <dt>Local vs UK</dt><dd><span id="o-l-vs-uk">X</span></dd>
          <dt>ETA vs STA</dt><dd><span id="o-eta-vs-sta">X</span></dd>
        </dl>
      </div>
      <div class="buttonbar">
        <button id="edit">Edit</button>
      </div>
    </section>

  </body>
</html>
