<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
   <meta charset='UTF-8'>
    <title>PA Assistant</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="script.js" type="module"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="pa.webmanifest" crossorigin="use-credentials">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="icon" href="icon-192.png">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
  </head>
  <body>
    <header>v1.6</header>
    <section id="input" class="j-input">
      <label for="flight">Flight Parameters:</label>
      <input id="flight" type="text" inputmode="numeric"
             placeholder="level track speed" pattern="[0-9 ]*">
      <label for="waypoint">Waypoint:</label>
      <input id="waypoint" type="text" inputmode="numeric"
             placeholder="bearing distance" pattern="[0-9 ]*">
      <label for="distances">Distances:</label>
      <input id="distances" type="text" inputmode="numeric"
             placeholder="left total" pattern="[0-9 ]*">
      <label for="times">Times:</label>
      <input id="times" type="text" inputmode="numeric"
             placeholder="eta sta zone" pattern="[0-9 \-]*">
      <div class="j-button-bar">
        <button id="clear">Clear</button>
      </div>
    </section>
    <section class="j-output" id="output">
      <dl>
        <dt>Altitude</dt><dd><span id="o-fp-alt"></span> km</dd>
        <dt>Tracking</dt><dd><span id="o-fp-fuzzy-trk"></span></dd>
        <dt>Ground Speed</dt><dd><span id="o-fp-speed"></span> km/h<br/>
        <span id="o-fp-secs-per-km"></span> s/km</dd>
      </dl>
      <dl>
        <dt>Position</dt><dd>
          <span id="o-wp-dist"></span> km to
          <span id="o-wp-fuzzy-brg-from"></span></dd>
        <dt>Left to run</dt><dd><span id="o-dist-left"></span> km</dd>
        <dt>Sector length</dt><dd><span id="o-dist-sector"></span> km</dd>
        <dt>Fraction remaining</dt><dd><span id="o-dist-left-fraction">X</span></dd>
      </dl>
      <dl>
        <dt>ETA (UK time)</dt><dd><span id="o-eta-uk"></span></dd>
        <dt>ETA (local time)</dt><dd><span id="o-eta-l"></span></dd>
      </dl>
      <dl>
        <dt>Now (local time)</dt><dd><span id="o-now-l"></span></dd>
        <dt>Delay</dt><dd><span id="o-delay"></span> minutes</dd>
      </dl>
    </section>

  </body>
</html>
